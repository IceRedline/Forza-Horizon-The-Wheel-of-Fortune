<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forza Horizon 4 - тест Rival's choice</title>
  <!-- Shared wheel styling. Page-specific behavior is controlled by body data attributes. -->
  <link rel="stylesheet" href="assets/css/forza-wheel.css">
</head>
<body data-force-rivals-choice="true">
  <div class="app">
    <header>
      <div>
        <h1>Forza Horizon 4</h1>
        <p class="subtitle">Тестовая версия: Rival's choice всегда попадает в сектор выбора</p>
      </div>
      <div class="header-actions">
        <label class="theme-toggle">
          <span>Тёмная</span>
          <input id="themeToggle" type="checkbox" aria-label="Светлая тема">
          <span class="theme-switch" aria-hidden="true"></span>
          <span>Светлая</span>
        </label>
        <div class="counter"><strong id="totalCars">0</strong> автомобилей в базе</div>
      </div>
    </header>

    <main>
      <section class="stage" id="stage">
        <div class="car-view">
          <div class="pointer" aria-hidden="true"></div>
          <article class="car-card" id="carCard">
            <div class="case-window" id="caseWindow">
              <div class="case-selector" aria-hidden="true"></div>
              <div class="case-track" id="caseTrack"></div>
            </div>
            <div class="car-info">
              <div class="status" id="status">Готово к розыгрышу</div>
              <div class="car-name" id="carName">Нажми «Крутить»</div>
              <div class="meta-row" id="metaRow"></div>
            </div>
          </article>
        </div>
        <div class="controls">
          <button id="spinButton" type="button">Крутить</button>
        </div>
      </section>

      <aside class="side">
        <section class="panel">
          <h2>Текущий результат</h2>
          <div class="stats">
            <div class="stat"><span>Класс PI</span><strong id="statPi">-</strong></div>
            <div class="stat"><span>Редкость</span><strong id="statRarity">-</strong></div>
            <div class="stat"><span>Цена</span><strong id="statValue">-</strong></div>
            <div class="stat"><span>Получение</span><strong id="statSource">-</strong></div>
          </div>
        </section>
        <section class="panel">
          <h2>История</h2>
          <div class="history" id="history"></div>
        </section>
      </aside>
    </main>
  </div>

  <!-- Data must load before the controller; it exposes window.FH4_CARS. -->
  <script src="data/cars.js"></script>
  <script src="assets/js/forza-wheel.js"></script>
</body>
</html>
